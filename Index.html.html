<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angel Oracle Deck — 44 Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#c9a84c;--gold-light:#e8d5a3;--parchment:#fdf6e8;--parchment-dark:#f0e4c4;--purple-deep:#1a103a;--purple-mid:#2e1f6e;--purple-bright:#6b52c8;--purple-pale:#c4b8ef;--muted:#7a6e8a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'EB Garamond',Georgia,serif;background:var(--purple-deep);color:var(--gold-light);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;background-image:radial-gradient(1px 1px at 15% 20%,rgba(255,255,220,.6) 0%,transparent 100%),radial-gradient(1px 1px at 72% 8%,rgba(255,255,220,.5) 0%,transparent 100%),radial-gradient(1px 1px at 40% 55%,rgba(255,255,220,.4) 0%,transparent 100%),radial-gradient(1px 1px at 88% 38%,rgba(255,255,220,.6) 0%,transparent 100%),radial-gradient(1px 1px at 5% 70%,rgba(255,255,220,.4) 0%,transparent 100%),radial-gradient(1px 1px at 60% 80%,rgba(255,255,220,.5) 0%,transparent 100%),radial-gradient(2px 2px at 50% 15%,rgba(255,255,220,.7) 0%,transparent 100%),radial-gradient(1px 1px at 22% 45%,rgba(255,255,220,.4) 0%,transparent 100%),radial-gradient(1px 1px at 80% 85%,rgba(255,255,220,.3) 0%,transparent 100%),radial-gradient(1px 1px at 33% 68%,rgba(255,255,220,.5) 0%,transparent 100%),radial-gradient(1px 1px at 92% 22%,rgba(255,255,220,.4) 0%,transparent 100%);pointer-events:none;}
.page{position:relative;z-index:1;padding:2rem 1rem 3rem;max-width:820px;margin:0 auto;}
.header{text-align:center;margin-bottom:1.5rem;}
.header-ornament{font-size:20px;color:var(--gold);letter-spacing:.3em;margin-bottom:.4rem;}
.header h1{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;letter-spacing:.15em;color:var(--gold-light);margin-bottom:.25rem;}
.header p{font-size:14px;color:var(--purple-pale);font-style:italic;}
.prompt-bar{text-align:center;font-size:14px;font-style:italic;color:var(--purple-pale);margin-bottom:1.2rem;letter-spacing:.04em;}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:6px;margin-bottom:1.8rem;}
.card{aspect-ratio:2/3;border-radius:8px;cursor:pointer;perspective:700px;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.4,0,.2,1);border-radius:8px;}
.card.flipped .card-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:8px;backface-visibility:hidden;overflow:hidden;}
.card-back{background:linear-gradient(160deg,#1a103a 0%,#2e1f6e 60%,#1a103a 100%);border:1px solid rgba(201,168,76,.35);display:flex;align-items:center;justify-content:center;}
.card-back svg{width:72%;height:72%;opacity:.7;}
.card:not(.flipped):hover .card-back{border-color:rgba(201,168,76,.8);}
.card:not(.flipped):hover .card-back svg{opacity:1;}
.card.flipped{cursor:default;}
.card-front{background:var(--parchment);border:1px solid var(--gold);transform:rotateY(180deg);display:flex;flex-direction:column;}
.card-art{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;border-bottom:1px solid var(--parchment-dark);}
.card-art svg{width:100%;height:100%;}
.card-label{padding:2px 3px;text-align:center;font-family:'Cormorant Garamond',serif;font-size:6px;color:#4a3a1a;letter-spacing:.05em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.reading-panel{display:none;background:rgba(26,16,58,.9);border:1px solid rgba(201,168,76,.3);border-radius:14px;margin-bottom:2rem;overflow:hidden;}
.reading-inner{display:grid;grid-template-columns:140px 1fr;}
@media(max-width:520px){.reading-inner{grid-template-columns:1fr;}.reading-card-col{border-right:none!important;border-bottom:1px solid rgba(201,168,76,.2);}}
.reading-card-col{border-right:1px solid rgba(201,168,76,.2);display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem;background:rgba(46,31,110,.3);}
.reading-card-large{width:96px;aspect-ratio:2/3;border-radius:10px;background:var(--parchment);border:1.5px solid var(--gold);display:flex;flex-direction:column;overflow:hidden;margin-bottom:.8rem;animation:cardReveal .6s cubic-bezier(.4,0,.2,1);}
@keyframes cardReveal{from{opacity:0;transform:rotateY(90deg) scale(.85);}to{opacity:1;transform:none;}}
.reading-card-large .card-art{flex:1;}
.reading-card-large .card-label{font-size:7px;padding:3px;}
.angel-name-big{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:500;color:var(--gold-light);text-align:center;letter-spacing:.06em;}
.angel-realm{font-size:10px;color:var(--purple-pale);font-style:italic;text-align:center;margin-top:3px;}
.reading-text-col{padding:1.4rem;}
.reading-keyword{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem;}
.reading-headline{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--gold-light);line-height:1.3;margin-bottom:.7rem;}
.reading-body{font-size:13.5px;line-height:1.75;color:#d4c8e8;margin-bottom:.9rem;}
.reading-body p{margin-bottom:.65rem;}
.reading-divider{border:none;border-top:1px solid rgba(201,168,76,.2);margin:.7rem 0;}
.affirmation-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:.25rem;}
.affirmation{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--gold-light);line-height:1.5;}
.reading-actions{padding:.9rem 1.4rem 1.4rem;border-top:1px solid rgba(201,168,76,.15);display:flex;gap:10px;flex-wrap:wrap;}
.btn{padding:8px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:'EB Garamond',serif;letter-spacing:.04em;transition:background .15s;}
.btn-primary{background:rgba(107,82,200,.25);border:1px solid var(--purple-bright);color:var(--purple-pale);}
.btn-primary:hover{background:rgba(107,82,200,.4);}
.btn-secondary{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--muted);}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-light);}
.history-strip{display:none;text-align:center;margin-bottom:1.4rem;}
.history-label-text{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.history-cards{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.history-thumb{width:34px;aspect-ratio:2/3;border-radius:5px;background:var(--parchment);border:1px solid var(--gold);display:flex;flex-direction:column;overflow:hidden;cursor:pointer;}
.history-thumb:hover{border-color:#e8d5a3;}
.history-thumb .card-art{flex:1;}
.history-thumb .card-label{font-size:4.5px;padding:1px 2px;}
</style>
</head>
<body>
<div class="page">
<header class="header">
  <div class="header-ornament">✦ ✦ ✦</div>
  <h1>Angel Oracle Deck</h1>
  <p>Still your mind · set an intention · choose the card that calls to you</p>
</header>
<div class="prompt-bar" id="promptBar">✦&ensp;44 angels await. Click the card that draws your eye.&ensp;✦</div>
<div class="deck-grid" id="deckGrid"></div>
<div class="history-strip" id="historyStrip">
  <div class="history-label-text" id="historyLabel">Cards drawn this session</div>
  <div class="history-cards" id="historyCards"></div>
</div>
<div class="reading-panel" id="readingPanel">
  <div class="reading-inner">
    <div class="reading-card-col">
      <div class="reading-card-large" id="readingCardLarge">
        <div class="card-art" id="readingArt"></div>
        <div class="card-label" id="readingLabel"></div>
      </div>
      <div class="angel-name-big" id="readingName"></div>
      <div class="angel-realm" id="readingRealm"></div>
    </div>
    <div class="reading-text-col">
      <div class="reading-keyword" id="readingKeyword"></div>
      <div class="reading-headline" id="readingHeadline"></div>
      <div class="reading-body" id="readingBody"></div>
      <hr class="reading-divider">
      <div class="affirmation-label">Your affirmation</div>
      <div class="affirmation" id="readingAffirmation"></div>
    </div>
  </div>
  <div class="reading-actions">
    <button class="btn btn-primary" id="pickAnotherBtn">✦ Draw another card</button>
    <button class="btn btn-secondary" id="startFreshBtn">Reshuffle &amp; start over</button>
  </div>
</div>
</div>
<script>
const G='#c9a84c',P='#e8d5a3';
function bg(c,b){return`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150"><rect width="100" height="150" fill="${c}"/>${b}</svg>`;}

Haniel:()=>bg('#060810',`<circle cx="50" cy="56" r="36" fill="none" stroke="#2a3070" stroke-width="2"/><circle cx="50" cy="56" r="27" fill="none" stroke="#4050a0" stroke-width="1"/><circle cx="50" cy="56" r="18" fill="#181840"/><circle cx="50" cy="56" r="11" fill="#282880"/><path d="M50,20L53,47L50,56L47,47Z" fill="${G}"/><path d="M50,92L53,65L50,56L47,65Z" fill="${G}" opacity=".5"/><path d="M14,56L41,53L50,56L41,59Z" fill="${G}" opacity=".5"/><path d="M86,56L59,53L50,56L59,59Z" fill="${G}"/><circle cx="50" cy="56" r="5" fill="${P}"/>${star(50,10,6,3,5,G)}`),

Barachiel:()=>bg('#080e06',`<path d="M50,10L53,19L62,17L58,26L68,28L60,34L64,44L55,41L55,52L50,45L45,52L45,41L36,44L40,34L32,28L42,26L38,17L47,19Z" fill="#245018"/><path d="M50,15L53,22L61,20L57,27L64,29L59,34L63,43L55,40L55,49L50,43L45,49L45,40L37,43L41,34L36,29L43,27L39,20L47,22Z" fill="#4a8830"/><circle cx="50" cy="32" r="6" fill="#70c050"/>${star(50,32,5,2.5,4,P)}<circle cx="28" cy="90" r="5" fill="#3a7028"/><circle cx="50" cy="84" r="6" fill="#3a7028"/><circle cx="72" cy="90" r="5" fill="#3a7028"/><circle cx="38" cy="102" r="4" fill="#58a040"/><circle cx="62" cy="102" r="4" fill="#58a040"/><path d="M18,120Q35,110 50,115Q65,110 82,120" stroke="${G}" stroke-width="1" fill="none"/>`),

function artSVG(name){const fn=ARTS[name];return fn?fn():bg('#0a0a20',`<circle cx="50" cy="75" r="30" fill="#1a1a50"/>${star(50,75,20,10,6,G)}<circle cx="50" cy="75" r="5" fill="${P}"/>`);}

const ANGELS=[
{name:"Michael",realm:"Archangel of Protection & Courage",keyword:"COURAGE · PROTECTION · TRUTH",headline:"You are wrapped in an unbreakable shield of divine light.",body:`<p>Archangel Michael steps forward now as your guardian and champion. His name means "Who is like God," and he arrives whenever you feel threatened, uncertain, or in need of the strength to speak your truth. He carries a sword of light — not to harm, but to cut cleanly through fear, confusion, and anything that no longer serves you.</p><p>If you have been hesitating to take a stand or speak honestly, Michael brings the courage you need. You do not need permission to occupy your full space in the world. The truth inside you is not a burden — it is your greatest protection.</p><p>Michael also guards your energy field. If you have felt drained by other people or circumstances, call on him to clear and seal your aura. Visualize his deep blue and royal purple light surrounding you completely. No energy that is not of love can penetrate that shield.</p>`,affirmation:"I am divinely protected. I speak my truth with courage and grace, and no harm can come near me."},
{name:"Gabriel",realm:"Archangel of Messages & Creativity",keyword:"COMMUNICATION · NEW BEGINNINGS · CLARITY",headline:"A message of great importance is finding its way to you.",body:`<p>Gabriel, the great messenger of heaven, arrives bearing news — either a literal message you have been waiting for, or an inner truth your soul is trying to deliver to your waking mind. This angel is associated with births, announcements, and the beginning of something profoundly new.</p><p>If you have felt called to write, speak, teach, or create — this is your sign. Gabriel supports artists, writers, communicators, and anyone whose purpose involves delivering truth through words or art. The blocks you have felt around expression are clearing. Your voice matters and the world is ready to receive it.</p><p>Watch for important emails, letters, phone calls, or conversations in the days ahead. Gabriel often works through the ordinary channels of daily life to deliver extraordinary guidance. Pay attention to what arrives.</p>`,affirmation:"I am open to receiving clear, divine guidance. My words carry power, and I use them to uplift and inspire."},
{name:"Raphael",realm:"Archangel of Healing & Wholeness",keyword:"HEALING · WHOLENESS · TRAVEL",headline:"Deep healing — of body, mind, and heart — is flowing through you now.",body:`<p>Archangel Raphael, whose name means "God heals," arrives as a gentle and tremendously powerful force of restoration. His energy is the most verdant green imaginable — the colour of new leaves after rain, of the living world renewing itself. That same renewal is available to you right now, in whatever part of your life most needs it.</p><p>If you or someone you love has been unwell, Raphael asks you to breathe deeply and invite his emerald light to flow through every cell of your body. He does not replace medicine — he works alongside it, addressing the root cause, not just the symptom. Emotional wounds, old grief, and long-held fears are especially in his domain.</p><p>Raphael is also the patron of travellers and healers. If you are in the healing professions, he stands with you in your work. If travel is ahead, ask him to go before you and smooth the way. Wherever you are going, he ensures you arrive safely and with everything you need.</p>`,affirmation:"Every cell of my being is filled with healing light. I am being restored to perfect wholeness right now."},
{name:"Uriel",realm:"Archangel of Wisdom & Illumination",keyword:"WISDOM · INSIGHT · ALCHEMY",headline:"The answer you have been searching for is closer than you think.",body:`<p>Uriel, whose name means "Light of God," is the archangel of wisdom and intellectual illumination. His golden light cuts through confusion to reveal the truth that was always there, waiting beneath the surface. He is often depicted carrying a lantern — a beacon in the fog of uncertainty.</p><p>If you have been wrestling with a problem, a decision, or a situation that makes no sense, Uriel is the angel to call upon. He specialises in sudden flashes of insight — those moments of "aha" that seem to come from nowhere. Before you sleep tonight, ask Uriel to deliver understanding while you rest. Pay close attention to your dreams and your first thoughts upon waking.</p><p>Uriel is also an alchemist of the soul, transforming what is painful into wisdom and compassion. The hardest experiences of your life have built something remarkable in you. Your wisdom is real, earned, and needed in the world.</p>`,affirmation:"I am guided by divine wisdom. Clarity and understanding flow to me easily and perfectly."},
{name:"Ariel",realm:"Angel of Nature & Wild Places",keyword:"NATURE · ABUNDANCE · MANIFESTATION",headline:"The natural world is sending you its healing and its ancient wisdom.",body:`<p>Angel Ariel — whose name means "Lion of God" — is the oversoul of the natural world. She is the guardian of animals, plants, rivers, forests, and the living intelligence that animates all of creation. When Ariel appears, she is calling you back to something elemental and real.</p><p>If you have been too long indoors, too tangled in screens and schedules, Ariel prescribes the simplest medicine: go outside. Place your bare feet on the earth. Let the sky be above you. Reconnecting with the natural world will restore something in you that nothing else can reach.</p><p>Ariel also governs manifestation. She reminds you that the natural world operates on principles of growth, seasons, and perfect timing. Your desires are seeds — they have been planted. Trust the process of growth even when nothing seems to be happening above the surface. The roots are deepening.</p>`,affirmation:"I am one with the natural world. Abundance flows to me as naturally and effortlessly as rain nourishes the earth."},
{name:"Chamuel",realm:"Archangel of Love & Relationships",keyword:"LOVE · COMPASSION · REUNION",headline:"Love — in every form — is returning to the centre of your life.",body:`<p>Archangel Chamuel, whose name means "One who seeks God," is the archangel of unconditional love, compassion, and peaceful relationships. His rose-pink energy signals a significant shift in your relationships — with others, and most importantly, with yourself.</p><p>If you have been lonely, longing for love, or struggling in a relationship, Chamuel offers something deeper: the healing of the heart's old wounds so that love can actually land and stay. So many of us have learned to hold love at arm's length because we learned early that it was not safe. Chamuel gently, persistently dissolves those walls.</p><p>Chamuel is also remarkable at helping you find things — lost objects, lost people, lost purpose. If you have been searching for someone or something important, ask Chamuel to assist. He specialises in the divine reunion of what was separated and will guide you, step by step, back to what matters most.</p>`,affirmation:"I am worthy of deep and lasting love. My heart is open, and love finds me wherever I go."},
{name:"Jophiel",realm:"Angel of Beauty & Illumination",keyword:"BEAUTY · JOY · CLEAR THINKING",headline:"Slow down and let beauty find you — it is already everywhere around you.",body:`<p>Archangel Jophiel, whose name means "Beauty of God," is the angel of beautiful thoughts, beautiful spaces, and the ability to see the divine in the ordinary. She is associated with the golden-yellow of late afternoon sunlight, and her presence is an invitation to lift your gaze from the problems at your feet and notice how extraordinary your life actually is.</p><p>Jophiel is particularly helpful when your thinking has become heavy, anxious, or caught in loops of negativity. She reminds you that you have a choice about which thoughts you water and which you let wither. Even in difficult times, there is always something beautiful to focus on. That focus is not denial; it is a superpower.</p><p>She also loves to help with physical environments. If your home or workspace has become cluttered, clearing it is a spiritual act. Light a candle, bring in flowers, open the windows. Create a space that reflects the life you want to live, and watch how your inner world shifts to match.</p>`,affirmation:"Beauty surrounds me and lives within me. I choose uplifting thoughts that reflect the truth of how magnificent my life is."},
{name:"Zadkiel",realm:"Archangel of Forgiveness & Mercy",keyword:"FORGIVENESS · TRANSMUTATION · FREEDOM",headline:"The chains of old resentment are dissolving — forgiveness is setting you free.",body:`<p>Archangel Zadkiel carries the violet flame of transmutation — a spiritual fire that transforms pain, resentment, and grievance into compassion, understanding, and freedom. He appears now with both an invitation and a reassurance. The invitation: to lay that weight down. The reassurance: forgiveness does not mean what happened was acceptable. It means you are no longer willing to let it define you or limit your future.</p><p>Forgiveness is not a gift you give the other person. It is the freedom you claim for yourself. Zadkiel walks beside you in this practice and lends you his strength when yours runs thin.</p><p>Zadkiel is also the angel of mercy, and he reminds you that the same compassion you are being asked to extend to others, you deserve to extend to yourself. You have done the best you could with what you knew at the time. Your mistakes have made you wise and more compassionate. That is alchemy.</p>`,affirmation:"I release the past with love. Forgiveness flows through me, and I am free to fully live my beautiful present."},
{name:"Azrael",realm:"Angel of Transition & Comfort",keyword:"ENDINGS · COMFORT · NEW CHAPTERS",headline:"You are being tenderly held through this transition. Something new is being born.",body:`<p>Azrael, the Angel of Transition, is perhaps the most misunderstood of the celestial beings. His presence does not signal literal death — it signals ending, transformation, and the profound tenderness required to move from one chapter of life into the next. His name means "Helper of God," and helping is precisely what he does.</p><p>If you are grieving — the loss of a person, a relationship, a job, a version of yourself — Azrael wraps you in his white and deep blue light and reminds you that grief is love with nowhere to go. It is sacred. You do not need to rush through it or perform recovery for others.</p><p>Azrael also carries the energy of new beginnings, because he understands that nothing truly ends — it transforms. What you are grieving is becoming something else. You are in the chrysalis right now, and it is disorienting because you are neither what you were nor yet what you are becoming. Trust the process. The wings are forming.</p>`,affirmation:"I trust in divine timing and the sacred process of change. Every ending in my life creates space for something beautiful and new."},
{name:"Haniel",realm:"Angel of the Moon & Intuition",keyword:"INTUITION · CYCLES · GRACE",headline:"Your intuition is your direct line to the divine — trust what you feel.",body:`<p>Archangel Haniel, whose name means "Joy of God," is the angel of the moon, of sacred feminine wisdom, and of intuition. She governs the tides of inner knowing — the gut feelings, the inexplicable certainty, the dream that holds more truth than a month of waking analysis. When Haniel appears, she is confirming that what you have been feeling is real.</p><p>You have likely been doubting yourself lately — second-guessing your perceptions, dismissing your inner knowing as "just a feeling," or waiting for external validation before you trust what you already know. Haniel says: stop. Your intuition is not noise. It is the clearest signal you receive, and it has been trying to guide you all along.</p><p>Haniel is also associated with the cycles of life. Not everything requires effort. Some things require grace. If you have been pushing against a natural cycle, she gently invites you to notice where you are in your own natural rhythm and flow with it.</p>`,affirmation:"I trust my intuition completely. I am divinely guided in every moment, and I follow my inner knowing with confidence and ease."},
{name:"Metatron",realm:"Archangel of Sacred Geometry & Records",keyword:"SACRED ORDER · PURPOSE · SPIRITUAL GROWTH",headline:"Your life has a sacred structure — and you are exactly where you need to be.",body:`<p>Archangel Metatron is one of the most powerful of all the archangels, unique in that he was once human — the prophet Enoch — before ascending to become the celestial scribe and keeper of the Akashic Records, the energetic archive of every soul's journey. His presence carries enormous significance.</p><p>Metatron is associated with sacred geometry — the divine mathematical patterns that underlie all of creation. His symbol, Metatron's Cube, contains all the geometric forms from which the physical world is constructed. When he appears, he is reminding you that your life, too, has a sacred structure, even when it appears chaotic. There is a pattern. There is purpose. You are not wandering — you are unfolding.</p><p>He is particularly supportive of lightworkers, spiritual seekers, and anyone in a period of rapid awakening. If you have recently had a significant spiritual experience or insight, Metatron is helping you integrate it. Your acceleration is real, and it is guided with tremendous care.</p>`,affirmation:"My life has purpose and sacred meaning. I trust the divine plan unfolding through me and embrace my spiritual journey fully."},
{name:"Sandalphon",realm:"Angel of Music & Prayer",keyword:"PRAYER · MUSIC · EARTH CONNECTION",headline:"Your prayers have been heard. The answer is already on its way.",body:`<p>Archangel Sandalphon, twin brother of Metatron, was once the prophet Elijah. His primary role is to carry human prayers to the divine and to return with answers, making him the most intimate of the archangels — the one who truly understands what it is to struggle, to doubt, to hope, and to love from the inside of a human life.</p><p>If you have been praying and feeling as though your prayers fall on deaf ears, Sandalphon appears to assure you: they do not. Every sincere prayer reaches its destination. The answer may not come in the form you expected, but the response is always love. Sometimes the answer is "yes." Sometimes it is "not yet." Sometimes it is "here is something better than what you asked for."</p><p>Sandalphon is also the angel of music — he literally gathers the prayers of the faithful and weaves them into music for the divine. If music is a deep part of your life, he stands with you in it. Even humming to yourself is prayer. Even dancing alone in your kitchen is sacred.</p>`,affirmation:"My prayers are always heard and answered. I am in constant communication with the divine, and the response I need always comes."},
{name:"Barachiel",realm:"Angel of Blessings & Joy",keyword:"BLESSINGS · GRATITUDE · GOOD FORTUNE",headline:"A cascade of blessings is entering your life — open your hands to receive.",body:`<p>Archangel Barachiel, whose name means "Blessings of God," is the chief of all guardian angels and the angel of good fortune, joy, and the recognition that our lives are saturated with blessings we so often forget to notice. He is sometimes depicted with rose petals, a symbol of the sweetness and beauty of divine grace, and his energy is warm, abundant, and impossibly generous.</p><p>Barachiel appears when you have been in a period of difficulty or lack, and he arrives to shift the energy. He does not dismiss what has been hard — he simply holds open the door to what is coming. And what is coming is good. This is a turning point. The changes will come both through miraculous unexpected openings and through the small, quiet accumulation of good things you may have been overlooking.</p><p>His greatest teaching is the power of gratitude as a magnet. Begin a practice of naming five specific things each day for which you are genuinely grateful. Not general things — specific ones. Watch what shifts when your attention turns toward what is already abundant.</p>`,affirmation:"I am abundantly blessed and I know it. Gratitude opens my eyes to the miracles that surround me every single day."},
{name:"Raguel",realm:"Angel of Justice & Harmony",keyword:"HARMONY · JUSTICE · DIVINE ORDER",headline:"Harmony is being restored. What is right will be made right.",body:`<p>Archangel Raguel, whose name means "Friend of God," is the archangel of justice, fairness, and harmony — the great restorer of divine order when it has been disrupted. Where things have gone wrong, Raguel works tirelessly to set them right again, ensuring that all interactions are eventually governed by love, respect, and truth.</p><p>If you are in a situation where you feel you have been treated unjustly — at work, in a relationship, in a legal matter — Raguel is the angel to call upon. He does not seek revenge on your behalf; he seeks restoration. The truth will come to light. The balance will be restored. Hold steady and trust the process.</p><p>Raguel is also deeply helpful in situations of conflict between people you care about. If you are caught between two factions or trying to mediate a difficult situation, ask Raguel to stand at the center of it with you. His presence alone can shift the energy in a room from adversarial to collaborative.</p>`,affirmation:"Divine justice flows through every area of my life. What is meant for me cannot be taken from me, and harmony is always restored."},
{name:"Raziel",realm:"Angel of Mysteries & Esoteric Knowledge",keyword:"MYSTICAL KNOWLEDGE · DREAMS · DIVINE SECRETS",headline:"The veil is thinning. Hidden knowledge is being revealed to you.",body:`<p>Archangel Raziel, whose name means "Secret of God," is the keeper of divine secrets and esoteric knowledge. He is said to stand so close to the divine presence that he hears all of heaven's conversations, and from this has compiled the great Book of Raziel — containing the entire accumulated knowledge of the universe. His energy shimmers at the edge of perception like deep rainbow light.</p><p>Raziel appears when you are in a period of spiritual acceleration — when you are awakening to truths that cannot be explained by ordinary logic, when synchronicities are multiplying, when you sense that reality is much stranger and more wonderful than you were taught to believe. He is confirming: you are right. There is more. And you are ready to receive it.</p><p>Pay particular attention to your dreams, meditation experiences, and any repeating symbols or numbers in your waking life. Raziel works heavily through these channels. Keep a journal. Write down everything that seems significant. Patterns will emerge that contain answers to questions your ordinary mind does not yet know how to ask.</p>`,affirmation:"I am open to divine mysteries and esoteric wisdom. The secrets of the universe reveal themselves to me at exactly the right pace."},
{name:"Camael",realm:"Archangel of Courage & Strength",keyword:"STRENGTH · PASSION · DIVINE WARRIOR",headline:"The fire within you is not a problem to manage — it is your power to claim.",body:`<p>Archangel Camael, whose name means "Strength of God," is the archangel of strength, courage, and the sacred warrior spirit. He is associated with the element of fire, with deep red and fierce orange, and with the quality of passion that is properly channeled into purposeful action. He stands in your reading like a torch — not to burn, but to illuminate and to warm.</p><p>If you have been suppressing your passion, dimming your fire for fear of being "too much," or exhausting yourself trying to maintain peace at the cost of your own truth — Camael arrives with a message: your fire is a gift, not a liability. The intensity you feel is divine energy wanting to move through you into the world as something beautiful and powerful. Do not manage it. Aim it.</p><p>Camael also supports those who are fighting for what is right. If there is a battle ahead — a difficult conversation, a courageous choice, a stand you need to take — he walks in front of you. You will find that when the moment comes, you have exactly the words, the strength, and the composure that are needed.</p>`,affirmation:"I am strong, passionate, and divinely courageous. My fire lights the way for myself and for everyone around me."},
{name:"Cassiel",realm:"Angel of Patience & Solitude",keyword:"PATIENCE · SOLITUDE · DEEP TIME",headline:"Rest. Be still. What you are waiting for is growing beneath the surface.",body:`<p>Archangel Cassiel, associated with Saturn and the great wheel of time, is the angel of patience, solitude, and the slow, deep processes that cannot be rushed. He is not an angel of inaction — he is an angel of perfect timing. What feels like waiting is actually preparation; what feels like stillness is actually deep growth happening at a level you cannot yet perceive.</p><p>If you have been frustrated by circumstances that seem stuck, Cassiel offers you a reframe: the seed in winter is not failing to be a flower. It is doing exactly what it needs to do in the season it is in. You are in a fallow season. This is not punishment; it is the sacred pause before the next great surge of growth. Trust the season you are in.</p><p>Cassiel is also the guardian of those who seek solitude for spiritual purposes. If you have been feeling the pull toward quieter living — less noise, fewer obligations, more time in contemplation — honour that call. Something in you will fall apart if you do not give it the silence it needs to hear itself think.</p>`,affirmation:"I trust divine timing completely. I am patient with myself and my life, knowing that everything unfolds in perfect order."},
{name:"Muriel",realm:"Angel of Emotions & the Sea",keyword:"EMOTIONAL FLOW · EMPATHY · RELEASE",headline:"Your emotions are not your enemy — they are the language your soul speaks.",body:`<p>Angel Muriel is the keeper of the emotional realm and the guardian of those with deep empathic gifts. Her name means "Myrrh of God," and like that ancient resin, she is deeply healing and connected to processes of grief, cleansing, and renewal. Her element is water — the sea and the tides — and she governs the deep, often turbulent waters of human feeling.</p><p>If you are a highly sensitive person or an empath — someone who feels others' emotions as their own — Muriel is one of your most important guides. She helps you establish healthy energetic boundaries not by shutting your heart, but by learning to distinguish what is yours and what belongs to someone else. You can be open and protected at the same time.</p><p>Muriel also works with those who have been suppressing their emotions. The feelings are trying to move through you, not stay in you. Crying is sacred. Grief honoured is grief healed. Let yourself feel. On the other side of the feeling is always more space, more lightness, more capacity for joy.</p>`,affirmation:"I honour my emotions as sacred guidance. I allow feelings to flow through me freely, and I release all that I no longer need to carry."},
{name:"Sachiel",realm:"Angel of Abundance & Providence",keyword:"ABUNDANCE · PROSPERITY · EXPANSION",headline:"The universe is conspiring in your favor — abundance is your divine birthright.",body:`<p>Archangel Sachiel, associated with Jupiter and the expansive principle of divine providence, is the angel of abundance, material blessings, and the flow of prosperity in all its forms. His energy is golden and generous — a wide-open hand rather than a clenched fist — and his appearance is a clear sign that the tide of material abundance is turning in your favor.</p><p>If you have been struggling financially or feeling the constriction of lack, Sachiel reminds you that lack is not the truth of your situation — it is a temporary condition in a universe of infinite supply. The blocks are not outside you; they live in the beliefs you hold about what you deserve. Those beliefs are ready to change now.</p><p>Sachiel also governs expansion of all kinds — the expansion of your life, your impact, your creative output. If you have been playing small, this is your signal to take up more space. Apply for the opportunity. Ask for the raise. Launch the project. Take the leap. Sachiel walks beside those who dare to expand.</p>`,affirmation:"I am open to receiving abundant blessings in every area of my life. Prosperity flows to me and through me with ease and gratitude."},
{name:"Selaphiel",realm:"Angel of Prayer & Devotion",keyword:"PRAYER · DEVOTION · DIVINE CONNECTION",headline:"Your sincere devotion creates a direct bridge between your heart and heaven.",body:`<p>Archangel Selaphiel is the angel of prayer — not just the words we speak, but the sincere turning of the heart toward the divine that underlies all genuine spiritual practice. His name means "Prayer of God," and his energy is that of the great mediator between the human and the sacred, ensuring that when we reach upward, something reaches back.</p><p>If your spiritual practice has felt dry, routine, or disconnected lately, Selaphiel appears to reignite it. Prayer, in his understanding, is not a formal recitation — it is any sincere expression of longing, gratitude, surrender, or love directed toward something greater than yourself. A walk in nature can be prayer. Holding a loved one can be prayer. The honest cry of a desperate heart is among the most powerful prayers there is.</p><p>Selaphiel also reminds you that the posture of prayer — the willingness to be in relationship with the divine, to ask and to listen — changes you even before the answer comes. The practice itself is the blessing. The reaching is the receiving.</p>`,affirmation:"My heart is a living prayer. Every thought of love and gratitude I send into the world returns to me multiplied a thousandfold."},
{name:"Anael",realm:"Angel of Love & Venus",keyword:"DIVINE LOVE · GRACE · ROMANCE",headline:"You deserve love — not the kind you earn, but the kind you simply are.",body:`<p>Angel Anael presides over love, beauty, and the planet Venus — the domain of attraction, sensuality, and the deep human longing to be truly known and truly loved. Her energy is fierce and luminous, the love that does not flinch from reality but sees through it to the essential beauty of every soul.</p><p>If you have been measuring your worth against your performance, your appearance, or your usefulness to others — Anael arrives to end that contract. Your worth is not a thing you establish or maintain. It is given, permanently and unconditionally, simply because you exist. The love you are seeking is not something to be won. It is something to be remembered.</p><p>Anael also governs the energy between people in romantic relationships. If you are in a partnership, she is encouraging a return to tenderness — small gestures of appreciation, moments of genuine seeing. If you are seeking love, she asks you first to become the love you seek: generous, curious, present, and openly affectionate with yourself and your life.</p>`,affirmation:"I am worthy of love exactly as I am. I receive love easily and freely, and I give love with an open, joyful, generous heart."},
{name:"Jeremiel",realm:"Angel of Hope & Prophetic Dreams",keyword:"REVIEW · HOPE · LIFE REVIEW",headline:"Look back with compassion — your whole journey has been leading here.",body:`<p>Archangel Jeremiel, whose name means "Mercy of God," is the angel of hope and of the life review — the sacred process of looking back at the experiences of your life not with judgment but with the tender eyes of understanding. He helps souls in transition review their earthly journey, and he assists the living in reviewing where they have been in order to understand more clearly where they are going.</p><p>If you have been caught in regret, replaying past mistakes, or struggling to forgive yourself for choices that still haunt you — Jeremiel sits with you in that review and offers his perspective: you were never as wrong as you feared. You were always doing your best with the light and the tools you had at the time. The mistakes were teachers, and they have done their work well in you.</p><p>Jeremiel also delivers prophetic visions and meaningful dreams. If you have been having vivid or unusual dreams, or if you have begun to sense how your life is asking to unfold, pay very close attention to those impressions. They are Jeremiel's way of showing you the path forward.</p>`,affirmation:"I look back on my journey with compassion and gratitude. Every experience has shaped me into exactly who I am meant to be."},
{name:"Barbiel",realm:"Angel of New Endeavors & Stars",keyword:"NEW STARTS · MOMENTUM · DESTINY",headline:"The moment to begin is now — your destiny is waiting for your first step.",body:`<p>Angel Barbiel is the angel of new beginnings and forward momentum — the angel of the courageous first step taken before you feel fully ready. He reminds you that you never will feel fully ready. Readiness is not a state you arrive at — it is a decision you make, and then the readiness follows.</p><p>If there is something you have been putting off — a creative project, a career shift, a courageous conversation, a new chapter of any kind — Barbiel stands at the threshold and holds the door open. He makes clear that the door is open, that you are capable, and that what waits on the other side is genuinely worth walking toward.</p><p>Barbiel is also associated with the luminous fixed stars of purpose — those deep callings we navigate by when everything else seems uncertain. Your deeper purpose is one of those fixed stars. You may not always see it clearly, but it has not moved. Let it guide you even when you can only find it faintly.</p>`,affirmation:"I begin with confidence and trust. Every step I take forward is supported by the full might of the universe moving with me."},
{name:"Verchiel",realm:"Angel of Joy & the Sun",keyword:"JOY · VITALITY · RADIANCE",headline:"Joy is not something to be earned — it is your natural state returning.",body:`<p>Angel Verchiel governs the radiant solar principle — the life-giving warmth and brilliance of the sun, and its counterpart within you: the capacity for genuine, spontaneous, embodied joy. Verchiel appears when you have been operating too long in the grey zone — going through the motions, doing what needs to be done, but somewhere along the way losing contact with what actually lights you up.</p><p>This is a card of returning. Not to some perfect future state, but to something you already have, buried under the accumulated weight of worry, obligation, and the forgetting that happens in busy lives. Joy does not require circumstances to improve. It requires your willingness to notice what is already beautiful and good, right now, even in the midst of imperfection.</p><p>Verchiel also governs vitality and physical wellbeing. If your energy has been low, he is asking you to consider what nourishes you at the level of spirit. What makes you feel alive? Do more of that. Your joy is not a luxury — it is a form of service to everyone around you.</p>`,affirmation:"Joy is my natural state. I radiate warmth and light into every room I enter, and this light returns to me magnified and multiplied."},
{name:"Ambriel",realm:"Angel of Communication & Truth",keyword:"TRUTH-TELLING · CLARITY · AUTHENTIC VOICE",headline:"Speak your truth — the words you have been holding back are ready to emerge.",body:`<p>Angel Ambriel governs all forms of honest communication — the words we speak, the ones we write, the ones we have been rehearsing in our heads at 3am but haven't yet had the courage to say aloud. Ambriel's presence is a gentle but persistent encouragement: the time for holding back has passed. What is true in you needs to be expressed.</p><p>This does not mean speaking without care — it means speaking with integrity. There is a difference between words that wound and words that are simply honest. Ambriel helps you find the language that is true without being cruel, direct without being harsh. He is the patron of those difficult conversations that need to happen, the letters that need to be written, the boundaries that need to be named.</p><p>Ambriel is also associated with deep listening — the receptive attention that makes others feel truly heard. If there is someone in your life who needs to be heard right now, practice this sacred form of presence with them. What you give in listening will be returned to you in understanding.</p>`,affirmation:"I speak my truth clearly, lovingly, and without apology. My authentic voice is a gift to the world, and I share it freely."},
{name:"Nathaniel",realm:"Angel of Fire & Transformation",keyword:"FIRE · PURIFICATION · RADICAL CHANGE",headline:"Something old is burning away to make room for something extraordinary.",body:`<p>Angel Nathaniel carries the sacred fire of purification — the divine flame that burns away what is false, what is stagnant, and what has outlived its purpose in your life. His presence can feel intense, even unsettling, because genuine transformation is rarely comfortable. But the fire Nathaniel brings destroys nothing that was ever truly yours. It only burns what was never meant to stay.</p><p>If things in your life are ending in ways that feel sudden or destabilizing — relationships shifting, structures falling away, the ground of your certainty becoming less certain — Nathaniel reminds you that this is not punishment. This is the pruning that precedes the flowering. What is being removed was blocking the light from what is trying to grow.</p><p>Nathaniel asks you to be willing to release your attachment to the way things have been. What is leaving is everything that was keeping you smaller than your soul's actual size. Let it go with grace and with gratitude for what it taught you, and with your eyes wide open to what is coming.</p>`,affirmation:"I release what no longer serves me with gratitude and grace. The fire of transformation is purifying my life for something truly magnificent."},
{name:"Perpetiel",realm:"Angel of Eternity & Soul Continuity",keyword:"ETERNITY · SOUL PURPOSE · INFINITE SELF",headline:"You are so much more than this moment in time — your soul has always known the way.",body:`<p>Angel Perpetiel carries the consciousness of eternity — the boundless, timeless nature of the soul that continues long before birth and long after death. Drawing this card is a reminder that you are not simply a personality with a short lifespan and a limited story. You are a soul with an infinite journey, and this particular chapter is one of countless rich adventures your eternal self has undertaken.</p><p>This perspective is enormously healing for the anxious, the grieving, and the lost. When you remember that your soul has navigated countless challenges — that you have been courageous before, that you have loved and lost and found again, that wisdom has been accumulating in you across vast stretches of time — the difficulties of this present moment become proportionate. They are real. And they are also held within something much larger.</p><p>Perpetiel also encourages you to trust the recurring themes and callings of your life — the things you have always been drawn to, the questions you have always circled back to. These are not accidents. They are your soul's curriculum in this lifetime, and they point directly toward your deepest purpose.</p>`,affirmation:"I am an eternal soul on a sacred journey. The wisdom I carry is ancient and vast, and I trust it to guide me perfectly through this and every life."},
{name:"Harahel",realm:"Angel of Knowledge & Learning",keyword:"KNOWLEDGE · LEARNING · INTELLECTUAL GIFTS",headline:"Your mind is one of your greatest spiritual gifts — honour it and use it fully.",body:`<p>Angel Harahel is the guardian of knowledge, libraries, archives, schools, and all who are devoted to the pursuit of understanding. He arrives to remind you that the mind, too, is a divine instrument — that the love of learning is a form of worship, and that the pursuit of truth through rigorous inquiry is a sacred path just as worthy as any other.</p><p>If you are a student, a researcher, a teacher, a writer, or simply someone who loves to understand how things work, Harahel stands at your shoulder in your work. He is particularly helpful when you are wrestling with a complex idea or navigating a steep learning curve. Ask for his assistance before you sit down to study or write, and notice how ideas begin to flow and connect in ways that feel almost inspired.</p><p>Harahel also governs the sharing of knowledge — the decision to teach, to write, to make what you have learned available to others. If you have expertise or insight that you have been hoarding out of perfectionism or fear, this is your invitation to begin sharing it. What you know is needed.</p>`,affirmation:"My mind is a divine instrument of truth and understanding. Learning comes easily to me, and I share my wisdom generously with the world."},
{name:"Adnachiel",realm:"Angel of Adventure & Freedom",keyword:"ADVENTURE · FREEDOM · BOLD LEAPS",headline:"The horizon is calling you — say yes to the adventure that is asking for you.",body:`<p>Angel Adnachiel governs the spirit of adventure, freedom, and the courageous willingness to aim at something beyond what is comfortable or familiar. He is associated with long journeys — both literal and metaphorical — and with the expansion of consciousness that happens when we deliberately step beyond the edges of what we already know.</p><p>If you have been feeling restless, constrained, or quietly desperate for something different — Adnachiel is telling you that those feelings are real information, not just noise to be managed. The restlessness is your soul communicating that it has outgrown its current container. Something in you knows there is more, and it is right. Honour that knowing.</p><p>This card does not necessarily prescribe a dramatic upheaval. For some, it is the small daring acts that open the door: saying yes to the invitation, having the conversation that changes everything, choosing the unfamiliar road even when the familiar one is perfectly serviceable. The arrow of your attention is the arrow. Aim it with intention, and let it fly.</p>`,affirmation:"I say yes to adventure and expansion. I am free, I am brave, and the universe places extraordinary opportunities before me as I move forward."},
{name:"Barchiel",realm:"Angel of Rainbows & Hope",keyword:"HOPE · RENEWAL · AFTER THE STORM",headline:"After everything you have been through, colour is returning to your world.",body:`<p>Angel Barchiel is the keeper of the rainbow — that ancient promise of renewal that appears specifically after the storm. Barchiel does not appear before difficulties; he appears after them, or in the midst of them, as the first sign that something is shifting, that the sun is returning, that the colour is coming back into a life that has been, for a while, too grey.</p><p>If you have been in a difficult period — a season of struggle, loss, uncertainty, or exhaustion — Barchiel is telling you that you are not at the beginning of that period. You are near the end of it. The worst has passed or is passing. The light is returning. Not as a dismissal of what has been hard, but as a true report from the universe: the tide has turned.</p><p>Barchiel also governs the particular kind of hope that is not naive — not the hope that denies difficulty, but the hope that has looked difficulty full in the face and decided to keep going anyway. That hope is one of the most powerful forces in the universe. It changes outcomes. It changes people. Hold onto yours.</p>`,affirmation:"I hold onto hope with both hands. The best is not behind me — it is ahead of me, and every day I move closer to it."},
{name:"Omniel",realm:"Angel of Oneness & Unity",keyword:"ONENESS · CONNECTION · UNIVERSAL LOVE",headline:"You are not alone — you are woven into the fabric of all that exists.",body:`<p>Angel Omniel carries the consciousness of absolute unity — the mystical truth that all apparent separation is an illusion, that every living being, every particle of matter, every moment of time is woven from the same luminous divine fabric. Drawing this card is an invitation to remember, if only for a moment, the staggering fact of your connection to everything.</p><p>If you have been feeling isolated, misunderstood, or profoundly alone, Omniel's message is not a platitude — it is a fact of physics as much as of spirit. The atoms in your body were forged in ancient stars. The air you breathe has been breathed by every human who has ever lived. The love that sustains your heart is the same love that holds galaxies in formation. You are not separate from this. You cannot be.</p><p>Omniel also calls you toward acts of compassionate connection — not out of obligation, but out of the recognition that when you ease another's suffering, you ease your own. When you celebrate another's joy, your own joy expands. The membrane between you and the world is thinner than you think. Let love move through it in both directions.</p>`,affirmation:"I am one with all of life. Every act of love I offer strengthens the web of connection that holds us all, and I am never truly alone."},
{name:"Theliel",realm:"Angel of Love & Divine Romance",keyword:"PURE LOVE · SOUL CONNECTION · DEVOTION",headline:"Love is the answer — and it is already alive inside you.",body:`<p>Angel Theliel presides over the purest and most absolute form of love — the love that is not conditional, not earned, not dependent on anyone's behavior or circumstances. This love is the foundational substance of reality itself, and Theliel's appearance is a reminder that you are made of it, you are sustained by it, and you have unlimited access to it in every moment.</p><p>If you have been searching for love in the world around you — in relationships, in achievements, in the approval of others — Theliel gently turns you inward. Not because external love is unimportant; it is one of the great gifts of a human life. But because the love you seek outside yourself can only be received in proportion to the love you have found inside yourself. The outer is always a reflection of the inner.</p><p>For those in romantic relationships, Theliel brings an infusion of tenderness and renewed appreciation. For those seeking partnership, he brings the reminder that the most magnetic thing you can do is to fall more deeply in love with your own life. For those grieving love lost, he brings this truth: love transforms, and it always finds a new form.</p>`,affirmation:"I am love, I give love, and I receive love in boundless measure. The love that I am is the most powerful force in the universe."},
{name:"Phuel",realm:"Angel of the Moon & Deep Waters",keyword:"DEPTH · MYSTERY · THE UNCONSCIOUS",headline:"What is hidden beneath the surface of your life holds the key to what you seek.",body:`<p>Angel Phuel governs the deep, mysterious waters of the unconscious — the realm of dreams, hidden fears, ancestral memories, and the vast submerged portions of the self that rarely come to light in ordinary waking life. He is the angel to call upon when you sense that what is happening on the surface of your life is being shaped by something you cannot quite see or name.</p><p>If you have been having powerful or disturbing dreams, experiencing irrational fears, or noticing that certain situations trigger responses in you that seem disproportionate to their surface cause — Phuel is inviting you to go deeper. Not with judgment, but with curiosity. The patterns that drive your life from below the waterline do not have to remain there. Bringing them gently into the light of awareness is itself a profound act of healing.</p><p>Phuel also governs the deep wisdom that lives in the body — the knowing that bypasses the logical mind entirely and speaks through sensation, through instinct, through the particular quality of silence that falls in certain moments. Learn to listen to this deeper intelligence. It has been trying to speak to you for a long time.</p>`,affirmation:"I dive fearlessly into the depths of my own wisdom. What is hidden in me only waits to be seen with loving eyes, and what I find there sets me free."},
{name:"Nemamiah",realm:"Angel of Perseverance & Just Causes",keyword:"PERSEVERANCE · VICTORY · RIGHT ACTION",headline:"You have not come this far to give up now — victory belongs to the persistent.",body:`<p>Angel Nemamiah is the patron of those who fight for what is right and who persevere when the path is difficult, long, or unrewarding in the short term. His name means "Praiseworthy of God," and he is particularly present with those whose work — be it advocacy, caregiving, long creative projects, or the slow labour of personal transformation — requires sustained commitment without immediate reward.</p><p>If you are tired, if you have been wondering whether your efforts are making any difference, if the gap between where you are and where you want to be feels discouraging — Nemamiah arrives specifically for you. He offers accurate perspective: you are further along than you think. The changes you have made, the ground you have gained, the person you have become — these are real, even when they are hard to see from the inside.</p><p>Nemamiah also lends his strength to those involved in legal battles, advocacy, or any cause where what is right is being contested by what is powerful. He does not promise easy wins. He promises that justice, in the end, prevails — and that those who stand for it are standing on the right side of something eternal.</p>`,affirmation:"I persevere with grace and faith. My continued efforts are making a profound difference, and victory is already written in the stars for me."},
{name:"Nithael",realm:"Angel of Grace & Divine Royalty",keyword:"GRACE · DIVINE INHERITANCE · SOVEREIGN SELF",headline:"You are a child of the divine — stand in that royalty with your whole self.",body:`<p>Archangel Nithael, whose name means "King of Heaven," carries the energy of divine aristocracy — not in any earthly sense of privilege or exclusivity, but in the spiritual sense of knowing your origin, knowing your worth, and moving through the world with the quiet, unshakeable dignity of one who knows they belong, unequivocally and forever, to the divine family.</p><p>If you have been shrinking, apologising for your existence, or allowing others to treat you as less than you are — Nithael appears to straighten your spine. You are not an accident. You are not too much. You are not a burden. You are a beloved child of the divine, and the light in you is not borrowed or conditional — it is inherent, it is permanent, and no person or circumstance can extinguish it.</p><p>Nithael is also associated with longevity, physical vitality, and the grace to age with beauty and wisdom. If you are in a period of transition related to your age, your body, or your sense of relevance — he reminds you that grace deepens over time. The best version of you is not behind you. It is still becoming.</p>`,affirmation:"I stand in the full grace of my divine inheritance. I am worthy, I am loved, and I move through the world with quiet, unshakeable dignity."},
{name:"Omael",realm:"Angel of Patience & Gentle Growth",keyword:"PATIENCE · GENTLENESS · SLOW UNFOLDING",headline:"The most beautiful things take time — trust the slow miracle happening inside you.",body:`<p>Angel Omael is the patron of patience not as passive waiting but as active trust — the deep faith that things are unfolding exactly as they should, on a timeline that is wiser than the one your anxious mind would prefer. He governs the principle of gentle, gradual growth — the kind that puts down deep roots before it puts up visible shoots, the kind that lasts.</p><p>If you have been impatient with yourself — frustrated that you haven't healed faster, grown faster, achieved more — Omael asks you to consider the oak tree. The most magnificent and enduring things in the natural world did not arrive fully formed overnight. They took decades, sometimes centuries, to become what they are. And no one looks at an ancient oak and wishes it had hurried.</p><p>Omael is also associated with the protection and flourishing of young things of all kinds. If there is something new in your life — a relationship, a project, a version of yourself — treat it with the same care you would give a seedling: adequate light, good soil, enough water, and the patience to let it become what it was designed to become.</p>`,affirmation:"I trust the perfect timing of my life. Everything I am growing toward is coming, and what I am becoming in the waiting is just as important as the destination."},
{name:"Rehael",realm:"Angel of Health & Filial Love",keyword:"HEALING · FAMILY BONDS · COMPASSION",headline:"Compassion — beginning with yourself — is the greatest medicine available to you.",body:`<p>Angel Rehael governs health, healing, and the particular form of love that exists between parents and children — the filial bonds that shape us so deeply, for better and for worse, and that often hold both the deepest wounds and the deepest healing available to us in this lifetime. If family is on your mind, Rehael's presence is significant.</p><p>If the relationship between you and a parent or child has been difficult or broken — Rehael does not promise a tidy resolution, because human relationships are not always tidy. What he offers is something more foundational: healing for your side of the equation. The gradual, courageous process of releasing the hold that old wounds have on your present life, so that you can engage from a more healed and whole place.</p><p>Rehael is also powerfully supportive of those navigating health challenges. Call on him for strength, clarity, and the guidance to make the choices that best serve your body and your wellbeing. He works in close partnership with Raphael and can be called upon alongside him for matters of physical healing.</p>`,affirmation:"Compassion flows through me and heals everything it touches. I am in perfect health in body, mind, and spirit, and love is my greatest medicine."},
{name:"Seheiah",realm:"Angel of Protection & Longevity",keyword:"DIVINE PROTECTION · SAFETY · LONG LIFE",headline:"You are held and protected by forces far more powerful than your fears.",body:`<p>Angel Seheiah is one of the most powerful of the protective angels — a guardian associated with longevity, protection from illness and misfortune, and the kind of divine shield that operates whether or not you are consciously aware of it. His energy is that of an unbreakable fortress of love built around you by the divine itself.</p><p>If you have been living with chronic anxiety, fear for your safety or the safety of loved ones, or a general sense that the world is not safe — Seheiah appears to offer you a genuine energetic intervention. You are watched over. You are not alone in this. The protection that surrounds you is real, even when it is invisible. Ask to feel it, and then breathe and let yourself be held.</p><p>Seheiah also governs the long view — he is associated with longevity and the full, complete life well lived. His presence is a reminder to take care of the vessel you have been given, to make the choices that honour your future self as well as your present one, and to recognise that how you live your ordinary days is precisely how you build your extraordinary life.</p>`,affirmation:"I am completely safe in the arms of the divine. I move through the world with confidence, knowing I am watched over and protected at every step."},
{name:"Vasiariah",realm:"Angel of Justice & Clarity",keyword:"JUSTICE · LIGHTNING CLARITY · SWIFT TRUTH",headline:"Sudden clarity is coming — the truth that has been obscured is about to be revealed.",body:`<p>Angel Vasiariah governs the swift, lightning-strike arrival of clarity, truth, and justice. Where some angels work slowly and subtly over long periods of time, Vasiariah operates in the mode of sudden revelation — the moment when everything you have been unable to see becomes unmistakably, illuminatingly clear. His energy is electric; his timing is precise.</p><p>If you have been confused about a situation, uncertain about someone's motives, unable to see through a fog of mixed messages and conflicting information — Vasiariah is telling you that the clarity you have been seeking is coming, and it is coming soon. Pay close attention to what is revealed to you in the next few days. Conversations, chance encounters, and your own sudden insights may all carry pieces of the truth that has been obscured.</p><p>Vasiariah is also associated with justice in legal and professional matters. If you are involved in any dispute where the truth needs to be established and fairness needs to prevail, invoke Vasiariah's presence. He specialises in ensuring that the right information reaches the right people at exactly the right time.</p>`,affirmation:"The truth in every situation is clear to me. Divine clarity illuminates my path, and I act always in alignment with what is right and true."},
{name:"Yeialel",realm:"Angel of Mental Strength & Healing",keyword:"MENTAL STRENGTH · CLARITY OF MIND · RESILIENCE",headline:"Your mind is stronger than your fears — and it is becoming stronger still.",body:`<p>Angel Yeialel is the guardian of mental health, clarity of thought, and the extraordinary resilience of the human mind. He is particularly present with those who are fighting battles that others cannot see — the inner wars with depression, anxiety, obsessive thought, and the particular exhaustion that comes from living with a mind that never stops.</p><p>If you have been struggling with your mental health, Yeialel is not here to minimise what you are experiencing. He is here to sit beside you in it and to remind you of something true: the mind that is capable of this much suffering is also capable of extraordinary resilience, creativity, and healing. The same intensity that makes your difficult times so difficult makes your good times luminous. Both are real. Both are yours.</p><p>Yeialel also governs intellectual courage — the willingness to examine your own beliefs, to think independently, to question what you have been told, and to arrive at your own understanding. This kind of rigorous, honest thinking is a spiritual practice in its own right. Exercise your mind as faithfully as you exercise any other part of yourself, and watch it reward you.</p>`,affirmation:"My mind is clear, strong, and resilient. I think with wisdom and compassion, and I am capable of navigating any challenge life brings to me."},
{name:"Zotiel",realm:"Angel of Peace & Stillness",keyword:"PEACE · BREATH · SACRED STILLNESS",headline:"Peace is not something you find — it is something you return to. It is already here.",body:`<p>Angel Zotiel is the guardian of peace — not the peace of perfect circumstances, but the deep inner stillness that exists beneath all circumstances, accessible in any moment to any willing heart. His teaching centres on the small, faithful practice of returning, again and again, to the present moment, where peace always lives.</p><p>If your nervous system has been in a chronic state of alert — if anxiety, hypervigilance, or relentless busyness have become your default mode — Zotiel prescribes something almost embarrassingly simple: breathe. Not as a coping strategy for crisis moments, but as a daily practice of returning home to your body, to the moment, to the peace that is always there when you stop moving fast enough to notice it.</p><p>Zotiel is also associated with the spiritual value of quietude — the deliberate cultivation of silence as a space in which the divine can be heard. In a world that has never been louder, choosing silence is a countercultural act of profound spiritual significance. Make the space. The peace that waits in it is your birthright, and it has been there for you all along.</p>`,affirmation:"Peace lives within me always. I return to my center with each breath, and in that stillness I find everything I have ever been searching for."},
{name:"Asmodel",realm:"Angel of April & Patient Beauty",keyword:"PATIENCE · BLOSSOMING · SLOW BEAUTY",headline:"Your time is coming — what you have been cultivating is about to bloom.",body:`<p>Angel Asmodel governs the patient, exquisite process of blossoming — the period just before the flower opens, when everything has been prepared and the conditions are finally right. He is associated with the season of transition and with the particular kind of hope that comes not from wishful thinking but from the tangible evidence of things growing and changing beneath the surface.</p><p>If you have been in a long period of preparation, of waiting, of doing the inner work without yet seeing the outer results — Asmodel appears with a specific and wonderful message: the wait is nearly over. What you have been cultivating is closer to its flowering than you know. The timing is not yet perfect — but it is very nearly perfect. Hold steady a little longer.</p><p>Asmodel is also associated with the beauty that can only come from patience — the beauty of the person who has lived fully, of the relationship that has been through difficulty and emerged richer, of the art that was made not quickly but well. There is a kind of beauty that shortcuts cannot produce. You are in the process of creating it. Don't rush the final steps.</p>`,affirmation:"I bloom in perfect divine timing. Everything I have been patiently cultivating is preparing to break through into magnificent, visible beauty."},
{name:"Hamaliel",realm:"Angel of Order & Sacred Work",keyword:"ORDER · PRECISION · SACRED WORK",headline:"The details of your daily life are not trivial — they are the substance of your purpose.",body:`<p>Angel Hamaliel governs order, precision, and the spiritual significance of the work we do with our hands and our organised minds. He is the patron of those who love systems, of those who find satisfaction in creating clarity out of chaos, and of those whose contribution to the world is expressed through careful, disciplined, reliable execution of important work.</p><p>If you have been dismissing your practical, organisational gifts as unspiritual — as the boring, lesser part of who you are — Hamaliel respectfully disagrees. The capacity to create and maintain order, to think clearly, to follow through reliably, to keep things working: these are not small gifts. They are among the most needed in any community, any organisation, any family. Your precision is a form of love.</p><p>Hamaliel also appears when your own life has become disorganised in ways that are draining your energy or clouding your thinking. A clear space, a good plan, a reliable routine — these are not the enemies of creativity and spontaneity. They are what makes creative, spontaneous living sustainable over time.</p>`,affirmation:"I bring sacred order and loving attention to every area of my life. My work is my offering, and I offer it with care, precision, and deep satisfaction."},
{name:"Zuriel",realm:"Angel of Harmony & Liberation",keyword:"LIBERATION · HARMONY · OPEN DOORS",headline:"The door you have been waiting for is open — step through without looking back.",body:`<p>Angel Zuriel, whose name means "My Rock is God," carries the energy of divine liberation — the moment when a door that has been stubbornly closed finally, triumphantly opens. He governs transitions, thresholds, and the courage required to step through an opening even when what lies beyond is unknown. He is your guide at the threshold, and he is telling you: the time is now.</p><p>If you have been feeling stuck — held back by circumstances, by other people, by your own fear — Zuriel's presence is significant. Something is shifting. A door that seemed sealed is becoming available. It may not be the exact door you were hoping for; divine creativity rarely offers us precisely what we imagined. But it is the right door, and on the other side of it is the next chapter of your life waiting to begin.</p><p>Zuriel also governs harmony in the aftermath of transition — the settling into the new that follows the courageous act of change. He will be with you not just at the threshold but through the adjustment period on the other side. The harmony you are seeking is real, and it is waiting for you just beyond the next step.</p>`,affirmation:"I step through the open doors of my life with faith and freedom. What waits for me on the other side of every threshold is better than what I am leaving behind."}
];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
let deck=shuffle(ANGELS),drawn=new Set(),history=[],awaitNext=false;

function buildGrid(){
  const g=document.getElementById('deckGrid');g.innerHTML='';
  deck.forEach((angel,i)=>{
    const c=document.createElement('div');c.className='card';
    c.innerHTML=`<div class="card-inner"><div class="card-face card-back">${backSVG()}</div><div class="card-face card-front"><div class="card-art">${artSVG(angel.name)}</div><div class="card-label">${angel.name}</div></div></div>`;
    c.addEventListener('click',()=>pick(i,c,angel));
    g.appendChild(c);
  });
}
buildGrid();

function pick(i,el,angel){
  if(drawn.has(i))return;
  if(!awaitNext&&history.length>0)return;
  drawn.add(i);awaitNext=false;
  el.classList.add('flipped');
  history.push({angel,i});
  showReading(angel);updateHistory();
  document.getElementById('promptBar').style.display='none';
  document.getElementById('pickAnotherBtn').style.display='inline-block';
}

function showReading(angel){
  const p=document.getElementById('readingPanel');p.style.display='block';
  const rc=document.getElementById('readingCardLarge');rc.style.animation='none';rc.offsetHeight;rc.style.animation='';
  document.getElementById('readingArt').innerHTML=artSVG(angel.name);
  document.getElementById('readingLabel').textContent=angel.name;
  document.getElementById('readingName').textContent=angel.name;
  document.getElementById('readingRealm').textContent=angel.realm;
  document.getElementById('readingKeyword').textContent=angel.keyword;
  document.getElementById('readingHeadline').textContent=angel.headline;
  document.getElementById('readingBody').innerHTML=angel.body;
  document.getElementById('readingAffirmation').textContent=angel.affirmation;
  p.scrollIntoView({behavior:'smooth',block:'start'});
}

function updateHistory(){
  const strip=document.getElementById('historyStrip'),row=document.getElementById('historyCards'),lbl=document.getElementById('historyLabel');
  if(history.length<2){strip.style.display='none';return;}
  strip.style.display='block';lbl.textContent=`Cards drawn this session (${history.length})`;
  row.innerHTML=history.map(({angel,i})=>`<div class="history-thumb" title="${angel.name}" onclick="revisit(${i})"><div class="card-art">${artSVG(angel.name)}</div><div class="card-label">${angel.name}</div></div>`).join('');
}
function revisit(i){const e=history.find(h=>h.i===i);if(e)showReading(e.angel);}
window.revisit=revisit;

document.getElementById('pickAnotherBtn').addEventListener('click',()=>{
  awaitNext=true;document.getElementById('pickAnotherBtn').style.display='none';
  const b=document.getElementById('promptBar');b.style.display='block';
  b.textContent='✦  Choose your next card from the deck above  ✦';
  window.scrollTo({top:0,behavior:'smooth'});
});
document.getElementById('startFreshBtn').addEventListener('click',()=>{
  drawn.clear();history=[];awaitNext=false;
  deck=shuffle(ANGELS);buildGrid();
  document.getElementById('readingPanel').style.display='none';
  document.getElementById('historyStrip').style.display='none';
  const b=document.getElementById('promptBar');b.style.display='block';
  b.textContent='✦  The deck has been reshuffled. 44 angels await your choice.  ✦';
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
